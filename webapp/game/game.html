<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1"> 
  

  <title>Sokoban Game</title>
  
  <!-- Collegamenti x lo stile -->
  <link rel="stylesheet" href="game.css"> 
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"> <!-- Bootstrap CSS -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"> <!-- font retrò -->
</head>

<!-- corpo pagina con classi di Bootstrap per tema scuro -->
<body class="bg-dark text-light">
  <!-- cont principale centrato -->
  <div class="container mt-5 text-center">
    <!-- titolo del gioco con stile personalizzato -->
    <h1 class="mb-4" style="font-family: 'Press Start 2P', cursive; color: #ffca28;">
      🎯 Sokoban 
    </h1>

    <!-- Riga per le statistiche di gioco -->
    <div class="row justify-content-center mb-3">
      <!-- Contatore mosse -->
      <div class="col-auto">
        <span>Mosse: <strong id="moves">0</strong></span>
      </div>
      <!-- Timer di gioco -->
      <div class="col-auto">
        <span>Tempo: <strong id="timer">00:00</strong></span>
      </div>
    </div>

    <!-- area canvas -->
    <div class="canvas-wrapper mb-4">
      <!--canvas xon bootstrap -->
      <canvas id="window" class="rounded border border-warning shadow-lg"></canvas>
    </div>

    <!-- pulsanti -->
    <div class="d-grid gap-2 d-md-flex justify-content-md-center mb-3">
      <!-- riavvio -->
      <button class="btn btn-warning me-md-2" id="restartBtn">
        🔄 Riavvia 
      </button>
      <!-- prox livello che inizialmente non si vede-->
      <button class="btn btn-success hidden" id="levels">
        ➡️ Prossimo livello 
      </button>
    </div>

    <!-- alert fine livello -->
    <div id="message" class="alert alert-success hidden" role="alert">
      Livello completato!
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
